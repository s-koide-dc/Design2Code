name: Project Consistency Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Set up Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: Install Node.js dependencies
      run: npm install

    - name: Sync Project Map
      run: python scripts/sync_project_map.py

    - name: Run Project Consistency Validation
      run: python scripts/validate_project_consistency.py

    - name: Run tests
      run: npm test
